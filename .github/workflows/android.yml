name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Keystore
      run: |
        mkdir -p android/x5/keystore
        keytool -genkey -v \
          -keystore android/x5/keystore/x5.jks \
          -alias x5 \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass changeit \
          -keypass changeit \
          -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=CN"

    - name: Create local.properties
      run: |
        echo "RELEASE_STORE_FILE=../keystore/x5.jks" >> android/x5/local.properties
        echo "RELEASE_STORE_PASSWORD=changeit" >> android/x5/local.properties
        echo "RELEASE_KEY_ALIAS=x5" >> android/x5/local.properties
        echo "RELEASE_KEY_PASSWORD=changeit" >> android/x5/local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: android/x5

    - name: Build with Gradle
      run: ./gradlew build
      working-directory: android/x5

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/x5/app/build/ou