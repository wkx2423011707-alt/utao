name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Keystore
  run: |
    keytool -genkey -v \
      -keystore android/x5/keystore/x5.jks \
      -alias x5 \
      -keyalg RSA \
      -keysize 2048 \
      -validity 10000 \
      -storepass android123 \
      -keypass android123 \
      -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=CN"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: android/x5
    - name: Build with Gradle
      run: ./gradlew build
      working-directory: android/x5
